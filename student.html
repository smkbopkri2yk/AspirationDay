<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Portal Siswa - AspirAction 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="shared.css">
    <style>
        /* Mobile-first optimizations */
        html,
        body {
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        /* Safe area insets for notched phones */
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Smooth touch scrolling */
        .scroll-area {
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Prevent input zoom on iOS (font-size >= 16px) */
        select,
        textarea,
        input {
            font-size: 16px !important;
        }

        /* Active/tap feedback for buttons */
        .tap-feedback:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Vote button haptic-like animation */
        .vote-btn:active {
            transform: scale(0.92);
            transition: transform 0.1s ease;
        }

        /* Bottom nav safe area */
        .bottom-safe {
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        }

        /* Custom mobile card styling */
        @media (max-width: 640px) {
            .clay-card {
                border-radius: 20px;
                box-shadow:
                    6px 6px 16px rgba(186, 203, 224, 0.4),
                    -6px -6px 16px rgba(255, 255, 255, 0.8),
                    inset 2px 2px 6px rgba(255, 255, 255, 0.7),
                    inset -2px -2px 6px rgba(186, 203, 224, 0.15);
            }

            .clay-input {
                border-radius: 14px;
            }
        }

        /* Success animation */
        @keyframes successPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .success-pop {
            animation: successPop 0.3s ease;
        }
    </style>
</head>

<body class="antialiased flex flex-col h-screen h-[100dvh] bg-gray-50/50">

    <div id="toast-container"
        class="fixed bottom-20 left-4 right-4 sm:left-auto sm:right-5 sm:bottom-5 z-[100] flex flex-col gap-3 pointer-events-none">
    </div>

    <!-- Student Header — compact on mobile -->
    <header
        class="bg-white/80 backdrop-blur-md shadow-sm px-4 py-3 sticky top-0 z-10 flex justify-between items-center">
        <a href="index.html"
            class="w-10 h-10 rounded-full hover:bg-blue-100 text-blue-600 transition inline-flex items-center justify-center tap-feedback">
            <i class="ph-bold ph-arrow-left text-lg"></i>
        </a>
        <div class="flex items-center gap-2">
            <div
                class="w-7 h-7 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center text-white shadow-sm">
                <i class="ph-fill ph-microphone-stage text-sm"></i>
            </div>
            <h2 class="text-lg font-bold text-blue-900">Portal Siswa</h2>
        </div>
        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 font-bold">
            <i class="ph-fill ph-user text-lg"></i>
        </div>
    </header>

    <!-- Student Content -->
    <div class="flex-1 overflow-y-auto scroll-area px-3 pt-3 pb-4 sm:p-8 fade-in">
        <!-- Tabs — larger touch targets for mobile -->
        <div class="max-w-md mx-auto flex gap-1.5 mb-4 bg-white/60 p-1 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="switchStudentTab('kirim')" id="std-tab-kirim"
                class="flex-1 py-3.5 font-bold rounded-xl bg-blue-600 text-white shadow transition text-sm tap-feedback">
                <i class="ph-bold ph-paper-plane-right mr-1"></i> Kirim Aspirasi
            </button>
            <button onclick="switchStudentTab('vote')" id="std-tab-vote"
                class="flex-1 py-3.5 font-bold rounded-xl text-gray-500 hover:bg-white transition text-sm relative tap-feedback">
                <i class="ph-bold ph-hand-fist mr-1"></i> Live Vote
                <span id="std-vote-badge"
                    class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full hidden flex items-center justify-center font-black shadow-md animate-bounce">!</span>
            </button>
        </div>

        <!-- Tab: Kirim Aspirasi -->
        <div id="std-content-kirim" class="max-w-md mx-auto clay-card p-5 sm:p-8">
            <p
                class="text-xs sm:text-sm text-gray-500 mb-5 flex items-center gap-2 bg-yellow-50 p-3 rounded-xl border border-yellow-200">
                <i class="ph-fill ph-mask-happy text-yellow-500 text-lg shrink-0"></i>
                <span>100% Anonim. Suaramu mengubah sekolah!</span>
            </p>
            <form id="form-aspiration" onsubmit="submitAspiration(event)" class="space-y-4">
                <div>
                    <label class="block font-semibold mb-1.5 ml-1 text-sm text-blue-900">Kategori Topik</label>
                    <select id="asp-category"
                        class="clay-input w-full p-3.5 text-gray-700 appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%236b7280%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e')] bg-no-repeat bg-[right_1rem_center] bg-[length:1.2em]"
                        required>
                        <option value="" disabled selected>Pilih Kategori...</option>
                        <option value="Fasilitas">🏢 Fasilitas Sekolah</option>
                        <option value="Akademik">📚 Akademik & Kurikulum</option>
                        <option value="Kedisiplinan">⚖️ Kedisiplinan</option>
                        <option value="Ekskul">⚽ Ekstrakurikuler</option>
                        <option value="Kesejahteraan">💖 Kesejahteraan Siswa</option>
                    </select>
                </div>
                <div>
                    <label class="block font-semibold mb-1.5 ml-1 text-sm text-blue-900">Isi Aspirasi</label>
                    <textarea id="asp-text"
                        class="clay-input w-full p-3.5 text-gray-700 h-28 sm:h-32 resize-none leading-relaxed"
                        placeholder="Tuliskan keresahan, ide, atau solusi cemerlangmu di sini..." required></textarea>
                    <p id="char-count" class="text-right text-xs text-gray-400 mt-1 mr-1">0 / 500</p>
                </div>
                <button type="submit" id="btn-submit"
                    class="clay-btn-blue w-full py-4 text-base font-bold flex items-center justify-center gap-2 tap-feedback active:scale-[0.98] transition-all">
                    <i class="ph-bold ph-paper-plane-right"></i> Kirim Sekarang
                </button>
            </form>
        </div>

        <!-- Tab: Live Vote -->
        <div id="std-content-vote" class="max-w-md mx-auto hidden pb-6 bottom-safe">
            <div class="text-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">Aspirasi Sedang Dibahas</h3>
                <p class="text-xs text-gray-500">Berikan suaramu untuk menentukan prioritas!</p>
            </div>

            <!-- OPEN MIC 2 (NORMAL MODE) CONTAINER -->
            <div id="student-om2-container" class="hidden space-y-4 mb-4">
                <!-- Javascript will inject the active issue card here -->
            </div>

            <div id="std-vote-list" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        // --- CHARACTER COUNTER ---
        const aspText = document.getElementById('asp-text');
        const charCount = document.getElementById('char-count');
        aspText.addEventListener('input', () => {
            const len = aspText.value.length;
            charCount.textContent = `${len} / 500`;
            if (len > 450) charCount.classList.add('text-red-500', 'font-semibold');
            else charCount.classList.remove('text-red-500', 'font-semibold');
        });
        aspText.maxLength = 500;

        // --- SILENT IP TRACKING (internal panitia) ---
        let _clientIP = 'unknown';
        let _clientUA = navigator.userAgent || 'unknown';
        (async () => {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                _clientIP = data.ip || 'unknown';
            } catch (e) { _clientIP = 'fetch-failed'; }
        })();

        // --- STUDENT TAB SWITCHING ---
        function switchStudentTab(tab) {
            document.getElementById('std-content-kirim').classList.add('hidden');
            document.getElementById('std-content-vote').classList.add('hidden');
            document.getElementById('std-tab-kirim').className = "flex-1 py-3.5 font-bold rounded-xl text-gray-500 hover:bg-white transition text-sm tap-feedback";
            document.getElementById('std-tab-vote').className = "flex-1 py-3.5 font-bold rounded-xl text-gray-500 hover:bg-white transition text-sm relative tap-feedback";

            if (tab === 'kirim') {
                document.getElementById('std-content-kirim').classList.remove('hidden');
                document.getElementById('std-tab-kirim').className = "flex-1 py-3.5 font-bold rounded-xl bg-blue-600 text-white shadow transition text-sm tap-feedback";
            } else {
                document.getElementById('std-content-vote').classList.remove('hidden');
                document.getElementById('std-tab-vote').className = "flex-1 py-3.5 font-bold rounded-xl bg-blue-600 text-white shadow transition text-sm tap-feedback";
                document.getElementById('std-vote-badge').classList.add('hidden');
                renderStudentVoteList();
            }
        }

        // --- SUBMIT ASPIRATION ---
        function submitAspiration(e) {
            e.preventDefault();
            const category = document.getElementById('asp-category').value;
            const text = document.getElementById('asp-text').value.trim();
            if (!text) return;

            const newAsp = {
                id: Date.now().toString(),
                category: category,
                text: text,
                time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                status: 'pending',
                upvotes: 0,
                downvotes: 0,
                userVote: null,
                _ip: _clientIP,
                _ua: _clientUA,
                _ts: new Date().toISOString()
            };

            aspirations.push(newAsp);
            saveState();

            // Show receipt card
            const icons = { 'Fasilitas': '🏢', 'Akademik': '📚', 'Kedisiplinan': '⚖️', 'Ekskul': '⚽', 'Kesejahteraan': '💖' };
            const receipt = document.createElement('div');
            receipt.className = 'mt-4 p-4 rounded-2xl bg-green-50 border border-green-200 fade-in';
            receipt.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
                        <i class="ph-fill ph-check-circle text-2xl text-green-500"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-green-800 text-sm">Aspirasi Terkirim!</p>
                        <p class="text-xs text-green-600 mt-0.5">${icons[category] || '📣'} ${escapeHTML(category)} • ${newAsp.time}</p>
                        <p class="text-sm text-gray-700 mt-1.5 leading-snug">&ldquo;${escapeHTML(text)}&rdquo;</p>
                        <p class="text-[10px] text-gray-400 mt-1">Menunggu moderasi dari panitia.</p>
                    </div>
                </div>`;
            const form = document.getElementById('form-aspiration');
            // Remove old receipts older than 1
            const existing = form.parentNode.querySelectorAll('.receipt-card');
            existing.forEach(r => r.remove());
            receipt.classList.add('receipt-card');
            form.parentNode.insertBefore(receipt, form.nextSibling);
            setTimeout(() => { receipt.style.opacity = '0'; receipt.style.transition = 'opacity 0.4s'; setTimeout(() => receipt.remove(), 400); }, 8000);

            document.getElementById('asp-category').value = '';
            document.getElementById('asp-text').value = '';
            charCount.textContent = '0 / 500';

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="ph-bold ph-check-circle"></i> Terkirim!';
            btn.classList.add('success-pop', '!bg-green-500');
            setTimeout(() => {
                btn.innerHTML = '<i class="ph-bold ph-paper-plane-right"></i> Kirim Sekarang';
                btn.classList.remove('success-pop', '!bg-green-500');
            }, 1500);
        }

        // --- LIVE VOTE RENDERING ---
        function renderStudentVoteList() {
            const listEl = document.getElementById('std-vote-list');
            const om2Container = document.getElementById('student-om2-container');

            // clear containers
            listEl.innerHTML = '';
            if (om2Container) {
                om2Container.innerHTML = '';
                om2Container.classList.add('hidden');
            }

            // Check if Debate Mode is active (only debate blocks voting)
            eventMode = localStorage.getItem('eventMode') || 'normal';
            if (eventMode === 'debat') {
                listEl.innerHTML = `
                    <div class="text-center py-10 px-6 bg-orange-50 rounded-2xl border-2 border-orange-200">
                        <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="ph-fill ph-sword text-3xl text-orange-500 animate-pulse"></i>
                        </div>
                        <div class="inline-flex items-center gap-2 px-3 py-1 bg-orange-600 rounded-full text-white text-xs font-bold tracking-wider mb-3">
                            <span class="w-1.5 h-1.5 rounded-full bg-red-400 animate-pulse"></span> DEBATE MODE
                        </div>
                        <p class="text-orange-800 font-bold text-sm mb-1">Voting sedang dinonaktifkan</p>
                        <p class="text-orange-500 text-xs">Sesi debat sedang berlangsung. Voting akan dibuka kembali setelah sesi selesai.</p>
                    </div>`;
                return;
            }

            // Normal Mode (Open Mic 2) - show only the currently active issue
            if (eventMode === 'normal') {
                if (!openMic2Data || openMic2Data.activeIndex === -1) {
                    listEl.innerHTML = `
                    <div class="text-center py-10 px-6 bg-white/50 rounded-2xl border border-dashed border-gray-300">
                        <i class="ph-duotone ph-projector-screen text-4xl text-gray-400 block mb-3"></i>
                        <p class="text-gray-500 font-semibold text-sm">Belum ada isu yang live<br>untuk divoting.</p>
                    </div>`;
                    return;
                }

                if (om2Container) {
                    om2Container.classList.remove('hidden');
                    const idx = openMic2Data.activeIndex;
                    const issue = openMic2Data.issues[idx];

                    // Get local vote for this issue from student's browser (simple prevention)
                    let localVotes = JSON.parse(localStorage.getItem('myOM2Votes') || '{}');
                    let myVote = localVotes[`issue_${idx}`]; // 'setuju' or 'tidak'

                    const btnSetujuActive = myVote === 'setuju' ? 'bg-green-600 text-white border-green-600 shadow-md transform scale-105' : 'bg-white text-green-600 border-green-200 hover:bg-green-50';
                    const btnTidakActive = myVote === 'tidak' ? 'bg-red-600 text-white border-red-600 shadow-md transform scale-105' : 'bg-white text-red-500 border-red-200 hover:bg-red-50';

                    om2Container.innerHTML = `
                        <div class="clay-card p-5 border border-blue-100 animate-slide-up bg-gradient-to-br from-blue-50 to-indigo-50/30">
                            <div class="flex items-start gap-3 mb-4">
                                <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-black flex-shrink-0 text-lg shadow-blue-300 shadow-sm border-2 border-white ring-2 ring-blue-100">
                                    ${idx + 1}
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800 text-base leading-tight">
                                        ${escapeHTML(issue.label) || `Isu Pembahasan #${idx + 1}`}
                                    </h3>
                                    <p class="text-xs text-blue-600 font-medium mt-1 flex items-center gap-1"><i class="ph-fill ph-broadcast animate-pulse"></i> Sedang Live di Proyektor</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button onclick="castOpenMic2Vote(${idx}, 'setuju')"
                                    class="w-full py-3 rounded-xl border-2 font-bold text-sm flex flex-col items-center justify-center gap-1 transition-all ${btnSetujuActive}">
                                    <i class="ph-fill ph-thumbs-up text-2xl"></i>
                                    <span>SETUJU</span>
                                </button>
                                <button onclick="castOpenMic2Vote(${idx}, 'tidak')"
                                    class="w-full py-3 rounded-xl border-2 font-bold text-sm flex flex-col items-center justify-center gap-1 transition-all ${btnTidakActive}">
                                    <i class="ph-fill ph-thumbs-down text-2xl"></i>
                                    <span>TID BERSEPAKAT</span>
                                </button>
                            </div>
                        </div>
                    `;
                }
                return;
            }


            const votableList = aspirations.filter(a => a.status === 'shown' || a.status === 'approved');

            if (votableList.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-10 px-6 bg-white/50 rounded-2xl border border-dashed border-gray-300">
                        <i class="ph-duotone ph-coffee text-4xl text-gray-400 block mb-3"></i>
                        <p class="text-gray-500 font-semibold text-sm">Belum ada aspirasi<br>yang disetujui untuk di-vote.</p>
                    </div>`;
                return;
            }

            votableList.sort((a, b) => {
                if (a.status === 'shown' && b.status !== 'shown') return -1;
                if (b.status === 'shown' && a.status !== 'shown') return 1;
                return 0;
            });

            votableList.forEach(asp => {
                const isActive = asp.status === 'shown';
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl shadow-sm border transition-all ${isActive ? 'bg-blue-50 border-blue-300 shadow-blue-100 ring-1 ring-blue-200' : 'bg-white border-gray-100'}`;

                const upActive = asp.userVote === 'up' ? 'bg-green-500 text-white border-green-500 shadow-green-200 shadow-md' : 'bg-white text-green-600 border-green-200 hover:bg-green-50';
                const downActive = asp.userVote === 'down' ? 'bg-red-500 text-white border-red-500 shadow-red-200 shadow-md' : 'bg-white text-red-600 border-red-200 hover:bg-red-50';

                card.innerHTML = `
                    ${isActive ? '<div class="text-[10px] font-bold text-blue-600 mb-2 uppercase tracking-widest flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> SEDANG DIBAHAS DI FORUM</div>' : ''}
                    <div class="flex gap-2 items-center mb-1.5">
                        <span class="text-xs font-bold px-2 py-0.5 bg-gray-100 rounded-md text-gray-600">${catIcons[asp.category]} ${escapeHTML(asp.category)}</span>
                    </div>
                    <p class="text-gray-800 font-medium text-sm mb-3 leading-relaxed">${escapeHTML(asp.text)}</p>
                    <div class="flex gap-2.5 pt-3 border-t border-gray-100">
                        <button onclick="castStudentVote('${asp.id}', 'up')" class="vote-btn flex-1 py-2.5 rounded-xl font-bold border-2 transition-all flex justify-center items-center gap-2 text-sm ${upActive}">
                            <i class="ph-bold ph-thumbs-up text-lg"></i> ${asp.upvotes}
                        </button>
                        <button onclick="castStudentVote('${asp.id}', 'down')" class="vote-btn flex-1 py-2.5 rounded-xl font-bold border-2 transition-all flex justify-center items-center gap-2 text-sm ${downActive}">
                            <i class="ph-bold ph-thumbs-down text-lg"></i> ${asp.downvotes}
                        </button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function castStudentVote(id, type) {
            const asp = aspirations.find(a => a.id === id);
            if (!asp) return;

            if (asp.userVote === type) {
                asp.userVote = null;
                if (type === 'up') asp.upvotes--;
                if (type === 'down') asp.downvotes--;
            } else {
                if (asp.userVote === 'up') asp.upvotes--;
                if (asp.userVote === 'down') asp.downvotes--;
                asp.userVote = type;
                if (type === 'up') asp.upvotes++;
                if (type === 'down') asp.downvotes++;
                showToast(type === 'up' ? 'Vote Setuju dikirim!' : 'Vote Tidak Prioritas dikirim!', 'success');
            }

            saveState();
            renderStudentVoteList();
        }

        // ====== CAST OPEN MIC 2 VOTE ======
        function castOpenMic2Vote(index, type) {
            // Check if OM2 mode is still active
            if (eventMode !== 'normal' || !openMic2Data || openMic2Data.activeIndex !== index) {
                alert('Voting untuk isu ini sudah ditutup!');
                return;
            }

            // Read device local votes map
            let localVotes = JSON.parse(localStorage.getItem('myOM2Votes') || '{}');
            let currentLocalVote = localVotes[`issue_${index}`];

            // If voting same as before, ignore
            if (currentLocalVote === type) {
                return;
            }

            // Decrement previous vote if switching
            if (currentLocalVote === 'setuju') openMic2Data.issues[index].setuju = Math.max(0, openMic2Data.issues[index].setuju - 1);
            if (currentLocalVote === 'tidak') openMic2Data.issues[index].tidakSetuju = Math.max(0, openMic2Data.issues[index].tidakSetuju - 1);

            // Increment new vote
            if (type === 'setuju') openMic2Data.issues[index].setuju++;
            if (type === 'tidak') openMic2Data.issues[index].tidakSetuju++;

            // Save locally
            localVotes[`issue_${index}`] = type;
            localStorage.setItem('myOM2Votes', JSON.stringify(localVotes));

            // Save to shared (broadcast)
            saveOpenMic2Data();

            // Rerender UI
            renderStudentVoteList();

            // Nice little feedback
            if (window.navigator && window.navigator.vibrate) navigator.vibrate(50);
        }

        // --- CROSS-PAGE SYNC ---
        onStorageSync((key) => {
            if (key === 'aspirations' || key === 'openMic2Data') {
                if (!document.getElementById('std-content-vote').classList.contains('hidden')) {
                    renderStudentVoteList();
                }
                document.getElementById('std-vote-badge').classList.remove('hidden');
            }
            if (key === 'eventMode') {
                eventMode = localStorage.getItem('eventMode') || 'normal';
                // Re-render vote list if currently visible
                if (!document.getElementById('std-content-vote').classList.contains('hidden')) {
                    renderStudentVoteList();
                }
            }
        });

        // Lightweight fallback refresh (Firebase handles primary sync)
        setInterval(() => {
            if (!document.getElementById('std-content-vote').classList.contains('hidden')) {
                renderStudentVoteList();
            }
        }, 15000);
    </script>
</body>

</html>
